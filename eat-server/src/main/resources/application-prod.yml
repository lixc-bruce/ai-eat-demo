# 生产环境配置（通过环境变量注入敏感信息）
spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

eat:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 604800000

logging:
  level:
    com.eat: info
